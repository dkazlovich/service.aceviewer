<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AceViewer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%233A9880'><polygon points='3,2 3,14 14,8'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%233A9880'><rect width='16' height='16' rx='4' fill='%233A9880'/><polygon points='5,4 5,12 12,8' fill='white'/></svg>">
<meta name="theme-color" content="#1a1a1a">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --accent: __ACCENT_COLOR__; --bg: #1a1a1a; --surface: #272727; --surface2: #303030; --border: #3a3a3a; --text: #f0f0f0; --text2: #b0b0b0; --muted: #888888; }
  html, body { height: 100%; width: 100%; position: fixed; overflow: hidden; background: var(--bg); -webkit-text-size-adjust: 100%; }
  body { color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; user-select: none; -webkit-user-select: none; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 16px; height: 16px; fill: #fff; }
  .header h1 { font-size: 16px; font-weight: 400; }
  .now-playing { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; height: 120px; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
  .now-playing.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 24px -8px rgba(0,0,0,0.5); }
  .now-playing-top { display: flex; justify-content: space-between; align-items: center; min-height: 28px; margin-bottom: 4px; }
  .now-playing-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.2px; text-transform: uppercase; display: flex; align-items: center; gap: 7px; }
  .active .now-playing-label { color: var(--accent); font-weight: 500; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); opacity: 0.3; }
  .offline .dot { background: #666 !important; opacity: 1; }
  .active .dot { background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--accent); opacity: 0.7; } 70% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(155, 155, 155, 0); opacity: 1; } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(155, 155, 155, 0); opacity: 0.7; } }
  .now-playing-body { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
  .marquee-container { width: 100%; overflow: hidden; position: relative; display: none; }
  .now-playing-match { display: inline-block; font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; will-change: transform; }
  .animate-marquee { animation: marquee-pure linear forwards; }
  @keyframes marquee-pure {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  .now-playing-channel { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); margin-top: 4px; display: none; }
  .now-playing-hint { font-size: 15px; color: #ffffff; line-height: 1.4; }
  .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; }
  .field-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; padding-left: 12px; }
  .input-wrap { display: flex; align-items: center; background: var(--bg); border: 1.5px solid #444; border-radius: 10px; min-height: 52px; margin-bottom: 12px; position: relative; transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden; }
  .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .input-field { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 17px; letter-spacing: -0.4px; padding: 12px 12px 12px 12px; outline: none; user-select: text !important; -webkit-user-select: text !important; white-space: nowrap; overflow-x: auto; overflow-y: hidden; display: block; line-height: 28px; -webkit-overflow-scrolling: touch; }
  .input-clear { flex-shrink: 0; width: 44px; height: 52px; background: none; border: none; color: var(--muted); font-size: 18px; display: none; align-items: center; justify-content: center; cursor: pointer; }
  .input-clear.show { display: flex; }
  .btn-play:active { transform: scale(0.98); }
  .status-wrap { height: 42px; margin-top: 10px; display: flex; align-items: center; }
  .status { font-size: 14px; padding: 8px 14px; border-radius: 10px; width: 100%; opacity: 0; visibility: hidden; text-align: center; transition: opacity 0.3s, visibility 0.3s; transform: translateZ(0); }
  .status.show { opacity: 1; visibility: visible; }
  .status.error { background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.2); color: #ff5252; }
  .status.success { background: rgba(100,200,100,0.08); border: 1px solid rgba(100,200,100,0.2); color: #6ec87a; }
  .status.loading { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  .now-playing.buffering { border-color: transparent; background: linear-gradient(var(--surface2), var(--surface2)) padding-box, conic-gradient(from var(--angle), var(--accent) 0deg, transparent 80deg, transparent 360deg) border-box; animation: spin-border 1.2s linear infinite; box-shadow: 0 8px 24px -8px rgba(0,0,0,0.5); }
  @keyframes spin-border { to { --angle: 360deg; } }
  .buffering .now-playing-label { color: var(--accent); font-weight: 500; }
  .buffering .dot { opacity: 1; background: transparent; border: 2px solid transparent; border-top-color: var(--accent); border-right-color: var(--accent); animation: spin-dot 0.7s linear infinite; }
  @keyframes spin-dot { to { transform: rotate(360deg); } }
  .btn-row { display: flex; width: 100%; }
  .btn-play { flex: 1; min-width: 0; height: 52px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: flex 0.35s cubic-bezier(0.4,0,0.2,1); }
  .btn-play.shrunk { flex: 0.7; }
  .btn-play:active { transform: scale(0.98); }
  .btn-play svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }
  .btn-stop { flex: 0; min-width: 0; overflow: hidden; height: 52px; border: none; border-radius: 10px; background: #e05c3a; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: flex 0.35s cubic-bezier(0.4,0,0.2,1), margin-left 0.35s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; margin-left: 0; }
  .btn-stop.visible { flex: 0.3; margin-left: 8px; }
  .btn-stop:active { transform: scale(0.98); }
  .btn-stop svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }
  .now-playing-stats { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); margin-top: auto; display: none; }
@media (orientation: landscape) and (max-height: 500px) {
  html, body { position: static; overflow-y: auto; }
  body { align-items: flex-start; }
}
</style>
</head>
<body>
<div class="card">
  <div class="header"><div class="logo"><svg viewBox="0 0 16 16"><polygon points="3,2 3,14 14,8"/></svg></div><h1>__DEVICE_INFO__</h1></div>
  <div class="now-playing" id="nowPlaying">
    <div class="now-playing-top"><div class="now-playing-label"><span class="dot"></span><span id="labelStatus">Offline</span></div></div>
    <div class="now-playing-body">
      <div class="marquee-container" id="marqueeContainer"><div class="now-playing-match" id="nowPlayingMatch"></div></div>
      <div class="now-playing-channel" id="nowPlayingChannel"></div>
      <div class="now-playing-stats" id="nowPlayingStats"></div>
      <div class="now-playing-hint" id="nowPlayingHint">Use the field below to enter a link to the desired content</div>
    </div>
  </div>
  <div class="section">
    <div class="field-label">Enter content link</div>
    <div class="input-wrap">
      <div id="aceLink" class="input-field" contenteditable="true" spellcheck="false"></div>
      <button class="input-clear" id="clearBtn" onclick="clearInput()">✕</button>
    </div>
    <div class="btn-row">
      <button class="btn-play" id="btnPlay" onclick="sendPlay()"><svg viewBox="0 0 16 16"><polygon points="3,2 3,14 14,8"/></svg>Play</button>
      <button class="btn-stop" id="btnStop" onclick="sendStop()"><svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12"/></svg>Stop</button>
    </div>
    <div class="status-wrap"><div class="status" id="status"></div></div>
  </div>
</div>
<script>
  document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => { const now = (new Date()).getTime(); if (now - lastTouchEnd <= 300) e.preventDefault(); lastTouchEnd = now; }, false);
  const aceLinkInput = document.getElementById('aceLink'), statusEl = document.getElementById('status'), nowPlaying = document.getElementById('nowPlaying'), nowPlayingMatch = document.getElementById('nowPlayingMatch'), nowPlayingChannel = document.getElementById('nowPlayingChannel'), nowPlayingStats = document.getElementById('nowPlayingStats'), nowPlayingHint = document.getElementById('nowPlayingHint'), labelStatus = document.getElementById('labelStatus'), marqueeContainer = document.getElementById('marqueeContainer'), clearBtn = document.getElementById('clearBtn'), btnPlay = document.getElementById('btnPlay'), btnStop = document.getElementById('btnStop'), ACE_ID_REGEX = /^[a-fA-F0-9]{40}$/;
  let statusTimer = null, isOffline = true, offlineTimer = null;
  function _showStop() { btnPlay.classList.add('shrunk'); btnStop.classList.add('visible'); }
  function _hideStop() { btnPlay.classList.remove('shrunk'); btnStop.classList.remove('visible'); }
  function _updateStats(peers, sd, su) { const p = []; if (sd != null) p.push('↓ ' + sd + ' KB/s'); if (su != null) p.push('↑ ' + su + ' KB/s'); if (peers != null) p.push(peers + ' peers'); const t = p.join(' · '); nowPlayingStats.textContent = t; nowPlayingStats.style.display = t ? 'block' : 'none'; }
  function _cancelOffline() { if (offlineTimer) { clearTimeout(offlineTimer); offlineTimer = null; } }
  function showStatus(msg, type) { if (statusTimer) clearTimeout(statusTimer); statusEl.textContent = msg; statusEl.className = 'status show ' + type; if (type !== 'loading') { statusTimer = setTimeout(() => { statusEl.className = 'status'; }, 4000); } }
  async function command(data) { const ctrl = new AbortController(); const timer = setTimeout(() => ctrl.abort(), 2000); try { const resp = await fetch('/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data), signal: ctrl.signal }); return resp.json(); } finally { clearTimeout(timer); } }
  nowPlayingMatch.addEventListener('animationend', () => {
    nowPlayingMatch.classList.remove('animate-marquee');
    setTimeout(() => { if (nowPlaying.classList.contains('active')) { nowPlayingMatch.classList.add('animate-marquee'); } }, 1000);
  });
  function setPlaying(title, peers, sd, su) {
    _cancelOffline(); isOffline = false;
    nowPlaying.classList.remove('buffering', 'offline', 'idle');
    const parts = (title || '').split('|'), originalText = parts[0].trim();
    const channelName = parts[1] ? parts[1].trim() : '';
    nowPlayingHint.style.display = 'none'; marqueeContainer.style.display = 'block'; labelStatus.textContent = 'Live'; nowPlaying.classList.add('active');
    nowPlayingChannel.textContent = channelName; nowPlayingChannel.style.display = channelName ? 'block' : 'none';
    _updateStats(peers, sd, su);
    _showStop();
    if (nowPlayingMatch.getAttribute('data-text') !== originalText) {
      nowPlayingMatch.setAttribute('data-text', originalText);
      nowPlayingMatch.classList.remove('animate-marquee');
      nowPlayingMatch.textContent = originalText;
      requestAnimationFrame(() => { setTimeout(() => {
        const textWidth = nowPlayingMatch.offsetWidth, containerWidth = marqueeContainer.offsetWidth;
        if (textWidth > containerWidth) {
          nowPlayingMatch.style.paddingRight = "20px";
          const duration = (textWidth + 20) / 30;
          nowPlayingMatch.style.animationDuration = duration + 's';
          nowPlayingMatch.classList.add('animate-marquee');
        } else { nowPlayingMatch.style.paddingRight = "0"; }
      }, 50); });
    }
  }
  function setBuffering(peers, sd, su) { _cancelOffline(); isOffline = false; nowPlaying.classList.remove('active', 'offline', 'idle'); nowPlaying.classList.add('buffering'); labelStatus.textContent = 'Prebuffering'; nowPlayingHint.style.display = 'none'; _updateStats(peers, sd, su); _showStop(); }
  function setIdle() { _cancelOffline(); isOffline = false; nowPlayingHint.style.display = 'block'; nowPlayingHint.textContent = 'Use the field below to enter a link to the desired content'; marqueeContainer.style.display = 'none'; nowPlayingChannel.style.display = 'none'; nowPlayingStats.style.display = 'none'; labelStatus.textContent = 'Idle'; nowPlaying.classList.remove('active', 'buffering', 'offline'); nowPlaying.classList.add('idle'); nowPlayingMatch.textContent = ''; nowPlayingMatch.setAttribute('data-text', ''); nowPlayingMatch.classList.remove('animate-marquee'); _hideStop(); }
  function setOffline() { _cancelOffline(); isOffline = true; nowPlayingHint.style.display = 'block'; nowPlayingHint.textContent = 'Kodi is offline'; marqueeContainer.style.display = 'none'; nowPlayingChannel.style.display = 'none'; nowPlayingStats.style.display = 'none'; labelStatus.textContent = 'Offline'; nowPlaying.classList.remove('active', 'buffering', 'idle'); nowPlaying.classList.add('offline'); nowPlayingMatch.textContent = ''; nowPlayingMatch.setAttribute('data-text', ''); nowPlayingMatch.classList.remove('animate-marquee'); _hideStop(); }
  let offlineCount = 0;
  async function pollStatus() { try { const data = await command({ action: 'status' }); offlineCount = 0; if (data.playing) setPlaying(data.title, data.peers, data.speed_down, data.speed_up); else if (data.prebuf) setBuffering(data.peers, data.speed_down, data.speed_up); else setIdle(); } catch (e) { offlineCount++; if (offlineCount >= 3) setOffline(); } }
  async function sendPlay() { aceLinkInput.blur(); if (isOffline) { showStatus('Kodi is offline', 'error'); return; } let inputVal = aceLinkInput.innerText.trim(), contentId = inputVal.replace(/^acestream:\/\//, ''); if (!contentId) { showStatus('Please enter an ID', 'error'); return; } if (!ACE_ID_REGEX.test(contentId)) { showStatus('Invalid ID', 'error'); return; } showStatus('Sending to Kodi...', 'loading'); try { const data = await command({ action: 'play', id: contentId }); if (data.status === 'ok') { statusEl.className = 'status'; clearInput(); } else { showStatus('Error: ' + data.message, 'error'); } } catch (e) { showStatus('No connection', 'error'); } }
  async function sendStop() { try { await command({ action: 'stop' }); showStatus('Stopped', 'success'); } catch (e) { showStatus('Error', 'error'); } }
  function clearInput() { aceLinkInput.innerText = ''; clearBtn.classList.remove('show'); }
  aceLinkInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
  aceLinkInput.addEventListener('input', () => { clearBtn.classList.toggle('show', aceLinkInput.innerText.length > 0); });
  aceLinkInput.addEventListener('paste', (e) => { e.preventDefault(); const text = (e.originalEvent || e).clipboardData.getData('text/plain').replace(/[\r\n]+/g, ""); document.execCommand('insertText', false, text); });
  setIdle();
  let pollInterval = setInterval(pollStatus, 1500);
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearInterval(pollInterval);
    } else {
      pollStatus();
      pollInterval = setInterval(pollStatus, 1500);
    }
  });
</script>
</body>
</html>
